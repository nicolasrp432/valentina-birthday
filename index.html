<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Para Valentina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap"
    rel="stylesheet" />

  <!-- Modular CSS Sheets -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/cover.css" />
  <link rel="stylesheet" href="css/photo.css" />
  <link rel="stylesheet" href="css/message.css" />
  <link rel="stylesheet" href="css/rsvp.css" />
</head>

<body>

  <!-- ══ COVER ══════════════════════════════════════════════ -->
  <div id="cover">
    <span class="cover-eyebrow">Disfruta tu día</span>
    <h1 class="cover-name">Para<br><em>Valentina</em></h1>
    <div class="cover-divider"></div>
    <button class="cover-btn" id="open-btn">Abrir</button>
  </div>

  <!-- ══ AUDIO ═══════════════════════════════════════════════ -->
  <audio id="audio" loop preload="auto">
    <source src="song.mp3" type="audio/mpeg" />
  </audio>

  <div class="audio-bar" id="audio-bar">
    <button class="audio-btn" id="audio-btn" title="Música">
      <!-- Play icon (default) -->
      <svg id="icon-play" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 5v14l11-7z" />
      </svg>
      <!-- Pause icon (hidden by default) -->
      <svg id="icon-pause" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
      </svg>
    </button>
  </div>

  <!-- ══ CONTENT ═════════════════════════════════════════════ -->
  <div id="content">

    <header class="page-header">
      <span class="page-tag">Feliz cumpleaños</span>
      <h2 class="page-title">
        <span class="t-felices">Felices</span>
        <span class="t-num">0</span>
      </h2>
    </header>

    <!-- FOTO ------------------------------------------------- -->
    <div class="photo-wrap" id="photo-wrap">
      <img src="foto.jpg" alt="Valentina"
        onerror="this.style.display='none'; document.getElementById('photo-fallback').style.display='flex';" />
      <div id="photo-fallback" class="photo-placeholder" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <path d="M21 15l-5-5L5 21" />
        </svg>
        <span>Tu foto aquí</span>
      </div>
      <div class="photo-caption">
        — Gracias por este inicio de año
      </div>
    </div>

    <!-- MENSAJE --------------------------------------------- -->
    <div class="message-block">
      <p class="message-text" id="message-text">
        <span id="typed"></span><span class="cursor" id="cursor"></span>
      </p>
      <p class="message-sign" id="message-sign">Con cariño ✦</p>
    </div>

    <!-- INVITACIÓN ------------------------------------------ -->
    <div class="invite-card" id="invite-card">
      <span class="invite-label">Una propuesta</span>
      <p class="invite-text">
        Si te apetece celebrarlo conmigo, escríbeme. 🎂
      </p>
      <div class="invite-actions" id="invite-actions">
        <button class="btn-yes" id="btn-yes">Me apetece 👀</button>
      </div>

      <!-- Estado confirmación -->
      <div id="confirm-state">
        <span class="confirm-emoji">🥂</span>
        <p class="confirm-title">¡Jum pillada!</p>
        <p class="confirm-sub">Te espero al otro lado.</p>
        <a class="btn-whatsapp"
          href="https://wa.me/34665015804?text=%F0%9F%8E%82%20Hola%2C%20me%20apetece%20mucho%20celebrarlo%20contigo"
          target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
          </svg>
          Escribir
        </a>
      </div>
    </div>

    <footer class="page-footer">
      <span class="footer-mark">Para Valentina.</span>
    </footer>

  </div><!-- /#content -->

  <!-- Orchestration Script -->
  <script type="module" src="js/main.js"></script>
</body>

</html>
